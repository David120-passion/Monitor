services:
  mysql:
    image: mysql:8.0
    container_name: bsc-monitor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cljslrl0620
      MYSQL_DATABASE: monitor
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pcljslrl0620"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitor-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bsc-monitor-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 可以通过环境变量覆盖配置（环境变量优先级高于配置文件）
      - RPC_ENDPOINT=${RPC_ENDPOINT:-https://bsc-mainnet.nodereal.io/v1/9613675572f24988819d24233504b290}
      - TOKEN_ADDRESS=${TOKEN_ADDRESS:-0xfe930c2d63aed9b82fc4dbc801920dd2c1a3224f}
      - TOKEN_CREATION_BLOCK=${TOKEN_CREATION_BLOCK:-70418263}
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_NAME=monitor
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=cljslrl0620
      - LOAD_HISTORY_FROM_DATABASE=${LOAD_HISTORY_FROM_DB:-false}
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - ./logs:/app/logs
    networks:
      - monitor-network

volumes:
  mysql_data:
    driver: local

networks:
  monitor-network:
    driver: bridge

